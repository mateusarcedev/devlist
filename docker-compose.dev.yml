services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tools4
      POSTGRES_PASSWORD: tools4pass
      POSTGRES_DB: tools4tech
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tools4 -d tools4tech"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
